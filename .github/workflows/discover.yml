name: Discover New Accounts

on:
  workflow_dispatch:
    inputs:
      pages:
        description: '每个账号扫描的关注列表页数 (每页200)'
        required: false
        default: '3'

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Run discovery
        env:
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
        run: python -m scripts.main --discover --pages=${{ github.event.inputs.pages || '3' }}

      - name: Commit updated accounts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/accounts.yaml
          git diff --cached --quiet || git commit -m "auto: discover new accounts"
          git push
